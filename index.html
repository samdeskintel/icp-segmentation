    <div class="sc" style="border-color:#444"><div class="n">${C.length}</div><div class="l">Customers</div></div>
    ${[1,2,3,4].map(k=>`<div class="sc" style="border-color:${ICP[k].c}"><div class="n" style="color:${ICP[k].c}">${cnt[k]||0}</div><div class="l">${ICP[k].l}</div></div>`).join('')}
    <div class="sc" style="border-color:#22c55e"><div class="n" style="color:#22c55e">${hcnt['G']}</div><div class="l">Healthy</div></div>
    <div class="sc" style="border-color:#f59e0b"><div class="n" style="color:#f59e0b">${hcnt['Y']}</div><div class="l">At Risk</div></div>
    <div class="sc" style="border-color:#ef4444"><div class="n" style="color:#ef4444">${hcnt['R']}</div><div class="l">Red</div></div>
  </div>`;

  html+=`<div class="st">ICP Archetypes — click to filter</div><div class="ag">`;
  [1,2,3,4].forEach(k=>{
    const kc=C.filter(c=>c.icp===k);
    const kg=kc.filter(c=>c.h==='G').length,ky=kc.filter(c=>c.h==='Y').length,kr=kc.filter(c=>c.h==='R').length;
    const karr=kc.reduce((a,c)=>a+c.arr,0);
    html+=`<div class="ac" style="border-color:${ICP[k].c}" onclick="setFilt('${k}')">
      <div class="act" style="color:${ICP[k].c}">${ICP[k].l}</div>
      <h3>${ICP[k].n}</h3>
      <div class="acn" style="color:${ICP[k].c}">${kc.length} <span style="font-size:12px;font-weight:400;color:var(--mt)">customers · ${fmt(karr)}</span></div>
      <div class="acd">${ICP[k].d}</div>
      <div class="ach">
        <span class="hp" style="background:#22c55e22;color:#22c55e">G:${kg}</span>
        <span class="hp" style="background:#f59e0b22;color:#f59e0b">Y:${ky}</span>
        <span class="hp" style="background:#ef444422;color:#ef4444">R:${kr}</span>
      </div>
    </div>`;
  });
  html+=`</div>`;

  html+=`<div class="frow" id="fbs"></div>`;
  html+=`<div class="ghdr"><div class="st" id="gh" style="margin:0"></div>
    <div class="leg">
      <div class="li"><div class="ld" style="background:#22c55e"></div>Healthy</div>
      <div class="li"><div class="ld" style="background:#f59e0b"></div>At Risk</div>
      <div class="li"><div class="ld" style="background:#ef4444"></div>Red</div>
      <div class="li"><div class="ld" style="background:#374151"></div>Unknown</div>
    </div>
  </div>`;
  html+=`<div class="cg" id="cg"></div>`;
  html+=`<div style="font-size:10px;color:var(--mt);text-align:center;border-top:1px solid var(--bd);padding-top:12px">⚠ Company sizes and contract amounts are as shown in HubSpot. Health: G=Green/Healthy, Y=Yellow/At-Risk, R=Red/High-Risk.</div>`;

  document.getElementById('p0').innerHTML=html;
  renderFilters();renderGrid();
}

function renderFilters(){
  const btns=[
    {f:'all',l:'All',c:'#555'},
    {f:'1',l:'ICP 1: Transport',c:ICP[1].c},
    {f:'2',l:'ICP 2: GSOC',c:ICP[2].c},
    {f:'3',l:'ICP 3: Gov/Defense',c:ICP[3].c},
    {f:'4',l:'ICP 4: High-Risk',c:ICP[4].c},
    {f:'CON',l:'🤝 Partners/Resellers',c:'#9ca3af'},
    null,
    {f:'all',l:'All Health',c:'#555',hf:'all'},
    {f:'all',l:'🟢 Healthy Only',c:'#22c55e',hf:'G'},
    {f:'all',l:'🟡 Yellow',c:'#f59e0b',hf:'Y'},
    {f:'all',l:'🔴 Red',c:'#ef4444',hf:'R'},
  ];
  document.getElementById('fbs').innerHTML=btns.map(b=>{
    if(!b)return`<div class="sep"></div>`;
    const isIcpBtn=b.hf===undefined;
    const on=isIcpBtn?(filt===b.f):(hfilt===(b.hf));
    const bg=on?b.c:'';
    return`<button class="fb ${on?'on':''}" style="${on?`background:${bg};border-color:${bg}`:''}" onclick="${isIcpBtn?`setFilt('${b.f}')`:`setHFilt('${b.hf}')`}">${b.l}</button>`;
  }).join('');
}

function setFilt(f){filt=f;renderFilters();renderGrid()}
function setHFilt(h){hfilt=h;renderFilters();renderGrid()}

function renderGrid(){
  const f=filtered();
  const lbl=filt==='all'?'All Companies':filt==='CON'?'Partners / Resellers':ICP[parseInt(filt)]?.n||'Filtered';
  const hLbl=hfilt==='all'?'':(hfilt==='G'?' · Healthy':`· ${hfilt==='Y'?'Yellow':'Red'}`);
  document.getElementById('gh').textContent=`${lbl}${hLbl} (${f.length})`;
  document.getElementById('cg').innerHTML=f.map(c=>{
    const hc=hColor(c.h);
    const uc1=UCM[c.u1]||UCM[''];
    return`<div class="cc" style="border-color:${icpC(c.icp)}" title="${c.n} | ${c.ind} | Est. ${c.sz==='E'?'Enterprise':c.sz==='L'?'Large':c.sz==='M'?'Mid-Market':'SMB'} | ${fmt(c.arr)} | ${seats(c.seats)} seats | ${uc1.l}">
      <div class="hdot" style="background:${hc}${c.h?'':'55'}" title="Health: ${c.h||'Unknown'}"></div>
      <div class="cn">${c.n}</div>
      <div class="ci">${c.ind}</div>
      <div class="cbrow">
        <span class="badge" style="color:${szC(c.sz)};background:${szC(c.sz)}22">${SZ[c.sz].l}</span>
        ${c.arr>0?`<span class="badge" style="color:#e6edf3;background:#ffffff11">${fmt(c.arr)}</span>`:`<span class="badge" style="color:#f59e0b;background:#f59e0b11">$0 ARR</span>`}
        ${c.u1?`<span class="badge" style="color:${ucColor(c.u1)};background:${ucColor(c.u1)}22">${c.u1}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

// --- PANE 1: Revenue & Risk ---
function renderP1(){
  const tot=totalARR(),atR=atRiskARR(),ylw=yellowARR();
  const gArr=C.filter(c=>c.h==='G').reduce((a,c)=>a+c.arr,0);
  const top=[...C].sort((a,b)=>b.arr-a.arr).slice(0,12);
  const red=C.filter(c=>c.h==='R').sort((a,b)=>b.arr-a.arr);
  const maxArr=Math.max(...C.map(c=>c.arr));

  let html=`<div class="stats">
    <div class="sc" style="border-color:#7d8590"><div class="n">${fmt(tot)}</div><div class="l">Total ARR</div></div>
    <div class="sc" style="border-color:#22c55e"><div class="n" style="color:#22c55e">${fmt(gArr)}</div><div class="l">Healthy ARR</div></div>
    <div class="sc" style="border-color:#f59e0b"><div class="n" style="color:#f59e0b">${fmt(ylw)}</div><div class="l">At-Risk ARR</div></div>
    <div class="sc" style="border-color:#ef4444"><div class="n" style="color:#ef4444">${fmt(atR)}</div><div class="l">Red ARR</div></div>
  </div>`;

  html+=`<div class="tg">
    <div class="card">
      <div class="st">ARR by ICP Archetype</div>`;
  [1,2,3,4].forEach(k=>{
    const karr=arrByICP(k);
    const pct=(karr/tot*100).toFixed(0);
    html+=`<div class="irow"><div class="il" style="color:${ICP[k].c}">${ICP[k].l}: ${ICP[k].n.split('/')[0].trim()}</div>
      <div class="ibg"><div class="ibar" style="width:${pct}%;background:${ICP[k].c}33;border-left:3px solid ${ICP[k].c}">
        <span style="color:${ICP[k].c}">${fmt(karr)}</span></div></div></div>`;
  });
  html+=`</div>
    <div class="card">
      <div class="st">Health Distribution by ARR</div>`;
  [['G','Healthy','#22c55e'],['Y','At Risk','#f59e0b'],['R','Red / High Risk','#ef4444'],['','Unknown','#374151']].forEach(([h,l,col])=>{
    const arr=C.filter(c=>c.h===h).reduce((a,c)=>a+c.arr,0);
    const pct=(arr/tot*100).toFixed(0);
    html+=`<div class="irow"><div class="il" style="color:${col}">${l}</div>
      <div class="ibg"><div class="ibar" style="width:${pct}%;background:${col}33;border-left:3px solid ${col}">
        <span style="color:${col}">${fmt(arr)} (${pct}%)</span></div></div></div>`;
  });
  html+=`</div></div>`;

  html+=`<div class="tg">
    <div class="card">
      <div class="st">Top 12 Accounts by ARR</div>
      <ul class="tlist">`;
  top.forEach(c=>{
    html+=`<li>
      <div class="tl">
        <div style="width:8px;height:8px;border-radius:50%;background:${hColor(c.h)};flex-shrink:0"></div>
        <div>
          <div style="font-size:11px;font-weight:600">${c.n}</div>
          <div style="font-size:9px;color:var(--mt)">${ICP[c.icp].l} · ${c.u1||'—'}</div>
        </div>
      </div>
      <div class="tn" style="color:${icpC(c.icp)}">${fmt(c.arr)}</div>
    </li>`;
  });
  html+=`</ul></div>
    <div class="card">
      <div class="st">🔴 Red Accounts — Churn Risk</div>`;
  if(red.length===0){html+=`<p style="color:var(--mt);font-size:12px">No red accounts — great!</p>`;}
  else{
    html+=`<ul class="tlist">`;
    red.forEach(c=>{
      html+=`<li>
        <div class="tl">
          <div>
            <div style="font-size:11px;font-weight:600">${c.n}</div>
            <div style="font-size:9px;color:var(--mt)">${ICP[c.icp].l} · ${c.ind} · ${c.u1||'—'}</div>
          </div>
        </div>
        <div class="tn" style="color:#ef4444">${fmt(c.arr)}</div>
      </li>`;
    });
    html+=`</ul>`;
    const redUCs=red.map(c=>c.u1).filter(u=>u);
    const conCount=red.filter(c=>c.u1==='CON'||c.u2==='CON').length;
    html+=`<div style="margin-top:10px;font-size:10px;color:var(--mt);line-height:1.6">
      <strong style="color:#e6edf3">Pattern:</strong> ${conCount} of ${red.length} red accounts are <strong style="color:#9ca3af">Consulting/Reseller</strong> use case — not core product users.
      Consider whether these accounts are a product fit issue or a CS motion issue.
    </div>`;
  }
  html+=`</div></div>`;

  html+=`<div class="card" style="margin-bottom:14px">
    <div class="st">$0 ARR Accounts (Pilots / Partnerships)</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">`;
  C.filter(c=>c.arr===0).forEach(c=>{
    html+=`<span style="background:${icpC(c.icp)}22;border:1px solid ${icpC(c.icp)}44;color:${icpC(c.icp)};padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600">${c.n}</span>`;
  });
  html+=`</div></div>`;

  document.getElementById('p1').innerHTML=html;
}

// --- PANE 2: Use Cases ---
function renderP2(){
  const ucCount={},ucArr={};
  C.forEach(c=>{
    [c.u1,c.u2].forEach(u=>{
      if(!u)return;
      ucCount[u]=(ucCount[u]||0)+1;
      ucArr[u]=(ucArr[u]||0)+c.arr;
    });
  });

  const sorted=Object.entries(ucCount).sort((a,b)=>b[1]-a[1]);
  const maxC=sorted[0][1];

  // ICP × use case matrix
  const matrix={};
  C.forEach(c=>{
    if(!matrix[c.icp])matrix[c.icp]={};
    [c.u1,c.u2].forEach(u=>{
      if(!u)return;
      matrix[c.icp][u]=(matrix[c.icp][u]||0)+1;
    });
  });

  const topUCs=['FAM','PSF','PSM','EP','TRM','SCM','IPS','IEG','CON'];

  let html=`<div class="callout">
    <strong>💡 Use case is your real segmentation axis — not industry, not archetype.</strong><br>
    GSOC-FAM (Fixed Asset Monitoring) is the dominant entry point at ${ucCount['FAM']||0} accounts. TRM, EP, and INT tracks represent distinct buyer personas.
    The <strong>CON (Consulting/Reseller)</strong> cluster is a separate channel motion worth deliberate investment — ${ucCount['CON']||0} accounts, 
    high ARR, but fundamentally different product usage.
  </div>`;

  html+=`<div class="ucg">
    <div class="card">
      <div class="st">Use Case Frequency (primary + secondary)</div>`;
  sorted.forEach(([uc,n])=>{
    const meta=UCM[uc]||UCM[''];
    const pct=(n/maxC*100).toFixed(0);
    html+=`<div class="ucrow"><div class="ucl" style="color:${meta.c}" title="${meta.l}">${meta.l}</div>
      <div class="ucbg"><div class="ucbar" style="width:${pct}%;background:${meta.c}55;border-left:3px solid ${meta.c}">
        <span>${n}</span></div></div></div>`;
  });
  html+=`</div>
    <div class="card">
      <div class="st">Use Case × ICP Archetype</div>
      <table class="matrix">
        <tr><th>Use Case</th>${[1,2,3,4].map(k=>`<th style="color:${ICP[k].c}">${ICP[k].l}</th>`).join('')}</tr>`;
  topUCs.forEach(uc=>{
    const meta=UCM[uc]||UCM[''];
    html+=`<tr><td style="color:${meta.c};font-size:10px">${uc}</td>`;
    [1,2,3,4].forEach(k=>{
      const v=matrix[k]?.[uc]||0;
      const bg=v>0?meta.c+'33':'transparent';
      const col=v>0?meta.c:'#374151';
      html+=`<td><div class="cell" style="background:${bg};color:${col}">${v||'·'}</div></td>`;
    });
    html+=`</tr>`;
  });
  html+=`</table>
    </div></div>`;

  html+=`<div class="tg">
    <div class="card">
      <div class="st">🤝 Channel / Partner Segment (CON use case)</div>
      <ul class="tlist">`;
  C.filter(c=>c.u1==='CON'||c.u2==='CON').sort((a,b)=>b.arr-a.arr).forEach(c=>{
    html+=`<li>
      <div class="tl">
        <div style="width:8px;height:8px;border-radius:50%;background:${hColor(c.h)};flex-shrink:0"></div>
        <div>
          <div style="font-size:11px;font-weight:600">${c.n}</div>
          <div style="font-size:9px;color:var(--mt)">${c.ind} · ${seats(c.seats)} seats</div>
        </div>
      </div>
      <div class="tn" style="color:#9ca3af">${fmt(c.arr)}</div>
    </li>`;
  });
  html+=`</ul>
      <div style="margin-top:10px;font-size:10px;color:var(--mt);line-height:1.6">These are <strong style="color:#e6edf3">resellers/integrators</strong> embedding samdesk in their service delivery. 
      They often have high ARR but low seat counts — meaning they're using the API/data layer, not the UI.<br>
      This is a distinct <strong style="color:#e6edf3">channel motion</strong> that deserves its own GTM track and pricing model.</div>
    </div>
    <div class="card">
      <div class="st">Recommended: Use Case Entry Points for GTM</div>
      <div style="font-size:11px;color:var(--mt);line-height:1.8">
        ${[
          ['FAM','#3b82f6','Fixed Asset Monitoring','Largest entry point. GSOC wedge product. Every vertical.'],
          ['TRM','#14b8a6','Travel Risk Management','Financial services, pharma, large enterprise. High seat count.'],
          ['EP','#ec4899','Executive Protection','Cross-vertical. Often co-occurs with FAM.'],
          ['IPS','#10b981','INT · Public Safety','Gov/Defense. Distinct buyer — emergency mgmt, law enforcement.'],
          ['IEG','#6366f1','INT · Economics & Geopolitics','Large enterprise, military. Premium positioning.'],
          ['CON','#9ca3af','Channel / Reseller','Separate GTM. API/data motion. Partner program candidate.'],
        ].map(([uc,col,name,desc])=>`
          <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--bd)">
            <span style="background:${col}22;color:${col};padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px">${uc}</span>
            <div><strong style="color:var(--tx)">${name}</strong><br>${desc}</div>
          </div>
        `).join('')}
      </div>
    </div></div>`;

  document.getElementById('p2').innerHTML=html;
}

renderP0();renderP1();renderP2();
</script>
